services:
  php:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile
    container_name: orderhub_php
    ports:
      - "8080:8080"
    environment:
      APP_ENV: dev
      DB_DSN: "pgsql:host=postgres;port=5432;dbname=orderhub"
      DB_USER: orderhub
      DB_PASSWORD: orderhub
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change-me-to-a-long-random-secret
      JWT_TTL: 3600
      RATE_LIMIT_PER_MINUTE: 100
    volumes:
      - ..:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "php bin/console migrate:up &&
             php -S 0.0.0.0:8080 -t public"

  worker:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile
    container_name: orderhub_worker
    environment:
      APP_ENV: dev
      DB_DSN: "pgsql:host=postgres;port=5432;dbname=orderhub"
      DB_USER: orderhub
      DB_PASSWORD: orderhub
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change-me-to-a-long-random-secret
    volumes:
      - ..:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "sleep 5 && php bin/console queue:work"

  postgres:
    image: postgres:16-alpine
    container_name: orderhub_postgres
    environment:
      POSTGRES_DB: orderhub
      POSTGRES_USER: orderhub
      POSTGRES_PASSWORD: orderhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderhub"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: orderhub_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
