openapi: 3.0.3
info:
  title: OrderHub API
  description: >
    SaaS multi-tenant de gestão de pedidos. Arquitetura hexagonal, Event Sourcing
    no agregado Order, CQRS com projeções síncronas e side effects assíncronos via fila.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Ambiente local (docker-compose)

tags:
  - name: Auth
  - name: Tenants
  - name: Products
  - name: Orders
  - name: Dashboard
  - name: Webhooks

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Autentica um usuário e retorna um JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                tenant_id:
                  type: string
                  description: Loja opcional para escopar o token; se omitida usa a primeira loja do usuário.
      responses:
        '200':
          description: Autenticado
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  userId: { type: string, format: uuid }
                  tenantId: { type: string, format: uuid, nullable: true }
        '401':
          $ref: '#/components/responses/Error'

  /tenants:
    post:
      tags: [Tenants]
      summary: Cria uma loja para o usuário autenticado
      description: Não exige tenant no token (é o endpoint que cria a primeira loja).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [store_name]
              properties:
                store_name: { type: string }
                webhook_url: { type: string, format: uri, nullable: true }
      responses:
        '201':
          description: Loja criada
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
        '401':
          $ref: '#/components/responses/Error'

  /tenants/me:
    get:
      tags: [Tenants]
      summary: Lê as configurações da loja ativa (nome, webhook)
      responses:
        '200':
          description: Configurações da loja
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TenantSettings' }
        '404': { $ref: '#/components/responses/Error' }
    patch:
      tags: [Tenants]
      summary: Atualiza nome da loja e/ou webhook — Tenant::rename()/configureWebhook()
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [store_name]
              properties:
                store_name: { type: string }
                webhook_url: { type: string, format: uri, nullable: true }
      responses:
        '200':
          description: Configurações atualizadas
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TenantSettings' }
        '422': { $ref: '#/components/responses/Error' }

  /products:
    get:
      tags: [Products]
      summary: Lista produtos do tenant (paginado, buscável por nome)
      parameters:
        - name: search
          in: query
          schema: { type: string }
          description: Filtra por nome (case-insensitive, substring)
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: perPage
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: Página de produtos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Product' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '429': { $ref: '#/components/responses/Error' }
    post:
      tags: [Products]
      summary: Cria um produto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, priceCents, stockQuantity]
              properties:
                name: { type: string }
                priceCents: { type: integer, minimum: 0 }
                stockQuantity: { type: integer, minimum: 0 }
                currency: { type: string, default: BRL }
      responses:
        '201':
          description: Produto criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
        '422': { $ref: '#/components/responses/Error' }

  /products/{id}:
    patch:
      tags: [Products]
      summary: Atualiza um produto (parcial)
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                priceCents: { type: integer, minimum: 0 }
                stockQuantity: { type: integer, minimum: 0 }
                currency: { type: string }
      responses:
        '204': { description: Atualizado }
        '404': { $ref: '#/components/responses/Error' }
    delete:
      tags: [Products]
      summary: Exclui um produto
      description: >
        Exclusão definitiva. Pedidos já criados preservam nome/preço via
        snapshot em OrderItem (CreateOrderHandler), então não são afetados.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204': { description: Excluído }
        '404': { $ref: '#/components/responses/Error' }

  /orders:
    get:
      tags: [Orders]
      summary: Lista pedidos do tenant (paginado, filtrável por status)
      parameters:
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/OrderStatus' }
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: perPage
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: Página de pedidos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/OrderSummary' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
    post:
      tags: [Orders]
      summary: Cria um pedido (dispara OrderCreated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customerName, customerEmail, items]
              properties:
                customerName: { type: string }
                customerEmail: { type: string, format: email }
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [productId, quantity]
                    properties:
                      productId: { type: string, format: uuid }
                      quantity: { type: integer, minimum: 1 }
      responses:
        '201':
          description: Pedido criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
        '422': { $ref: '#/components/responses/Error' }

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Detalhe do pedido (lê do read model)
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Pedido
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderSummary' }
        '404': { $ref: '#/components/responses/Error' }

  /orders/{id}/pay:
    post:
      tags: [Orders]
      summary: Registra pagamento (dispara PaymentReceived)
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentMethod: { type: string, example: pix }
      responses:
        '200':
          description: Pago
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: pago }
        '409': { $ref: '#/components/responses/Error' }

  /orders/{id}/ship:
    post:
      tags: [Orders]
      summary: Marca como enviado (dispara OrderShipped)
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trackingCode]
              properties:
                trackingCode: { type: string }
      responses:
        '200':
          description: Enviado
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: enviado }
        '409': { $ref: '#/components/responses/Error' }

  /orders/{id}/deliver:
    post:
      tags: [Orders]
      summary: Marca como entregue (dispara OrderDelivered) — fecha o ciclo de vida do pedido
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Entregue
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: entregue }
        '409': { $ref: '#/components/responses/Error' }

  /orders/{id}/cancel:
    post:
      tags: [Orders]
      summary: Cancela pedido (dispara OrderCancelled) — válido em criado e em pago
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200':
          description: Cancelado
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: cancelado }
        '409':
          description: Estado inválido para cancelamento (ex. já enviado)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /orders/{id}/invoice:
    get:
      tags: [Orders]
      summary: Baixa a nota fiscal (PDF simulado) gerada de forma assíncrona ao pagamento
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: PDF da nota fiscal
          content:
            application/pdf:
              schema: { type: string, format: binary }
        '404':
          description: Pedido não encontrado, ou nota ainda não gerada pelo worker (INVOICE_NOT_READY)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /orders/{id}/timeline:
    get:
      tags: [Orders]
      summary: Histórico bruto de eventos do pedido, direto do event store, em ordem cronológica
      description: Mesma GetOrderEventTimelineQuery usada pela timeline da interface Web — paridade para integrações externas.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Timeline de eventos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/EventTimelineEntry' }
        '404': { $ref: '#/components/responses/Error' }

  /dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Métricas agregadas do tenant (lê das projeções)
      parameters:
        - name: topProductsLimit
          in: query
          schema: { type: integer, default: 5 }
      responses:
        '200':
          description: Resumo do dashboard
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardSummary' }

  /webhooks/deliveries:
    get:
      tags: [Webhooks]
      summary: Histórico de tentativas de entrega do webhook do tenant (sucesso/falha, código, erro)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Tentativas de entrega, mais recentes primeiro
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/WebhookDelivery' }

  /webhooks/test:
    post:
      tags: [Webhooks]
      summary: Dispara um payload de teste síncrono para o webhook configurado da loja
      responses:
        '200':
          description: Resultado da tentativa de entrega (não indica necessariamente sucesso — ver campo success)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  responseCode: { type: integer, nullable: true }
                  error: { type: string, nullable: true }
        '409':
          description: Nenhum webhook configurado para esta loja
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  security:
    - bearerAuth: []

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    Error:
      description: Erro
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    OrderStatus:
      type: string
      enum: [criado, pago, enviado, entregue, cancelado]

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string, example: VALIDATION_ERROR }
            message: { type: string }

    Product:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        price: { type: string, example: '99.00' }
        priceCents: { type: integer }
        currency: { type: string }
        stockQuantity: { type: integer }

    OrderItem:
      type: object
      properties:
        productId: { type: string, format: uuid }
        productName: { type: string }
        unitPriceCents: { type: integer }
        currency: { type: string }
        quantity: { type: integer }

    OrderSummary:
      type: object
      properties:
        orderId: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        customerName: { type: string }
        customerEmail: { type: string }
        status: { $ref: '#/components/schemas/OrderStatus' }
        total: { type: string, example: '900.00' }
        totalCents: { type: integer }
        currency: { type: string }
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderItem' }
        trackingCode: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TenantSettings:
      type: object
      properties:
        id: { type: string, format: uuid }
        storeName: { type: string }
        webhookUrl: { type: string, format: uri, nullable: true }

    EventTimelineEntry:
      type: object
      properties:
        type: { type: string, example: PaymentReceived }
        occurredAt: { type: string, format: date-time }
        payload: { type: object }

    WebhookDelivery:
      type: object
      properties:
        orderId: { type: string, format: uuid, nullable: true, description: 'null para disparos manuais via /webhooks/test' }
        url: { type: string, format: uri }
        success: { type: boolean }
        responseCode: { type: integer, nullable: true }
        error: { type: string, nullable: true }
        attemptedAt: { type: string, format: date-time }

    PageMeta:
      type: object
      properties:
        page: { type: integer }
        perPage: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }

    DashboardSummary:
      type: object
      properties:
        totals:
          type: object
          properties:
            paidOrders: { type: integer }
            revenue: { type: string }
            revenueCents: { type: integer }
            averageTicket: { type: string }
            averageTicketCents: { type: integer }
        salesByDay:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              ordersCount: { type: integer }
              revenue: { type: string }
              revenueCents: { type: integer }
        topProducts:
          type: array
          items:
            type: object
            properties:
              productId: { type: string, format: uuid }
              productName: { type: string }
              unitsSold: { type: integer }
              revenue: { type: string }
              revenueCents: { type: integer }

security:
  - bearerAuth: []
